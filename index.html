<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0f0f0f" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="฿ ⇄ €" />
<title>฿ ⇄ €</title>
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22THB%20%E2%87%84%20EUR%22%2C%22short_name%22%3A%22%E0%B8%BF%E2%87%84%E2%82%AC%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230f0f0f%22%2C%22theme_color%22%3A%22%230f0f0f%22%7D" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1c1c1c;
    --surface-2: #2a2a2a;
    --border: rgba(255,255,255,0.08);
    --text: #f5f5f5;
    --muted: #888;
    --dim: #555;
    --accent: #e8e0c8;
    --accent-soft: rgba(232, 224, 200, 0.25);
    --green: #5cb37b;
    --red: #d96666;
    --mono: 'SF Mono', 'Courier New', Courier, monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
    overflow: hidden;
  }

  body {
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 12px) 14px env(safe-area-inset-bottom, 8px);
    gap: 10px;
  }

  /* ───── Rate strip (single line, with refresh) ───── */
  .rate-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 4px 12px;
    border-bottom: 0.5px solid var(--border);
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text);
  }
  .rate-content {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .rate-content::-webkit-scrollbar { display: none; }
  .rate-strip .sep { color: var(--dim); }
  .rate-strip .age { color: var(--muted); }
  .refresh-btn {
    background: none; border: none;
    color: var(--muted);
    font-size: 18px;
    padding: 4px 6px;
    cursor: pointer;
    line-height: 1;
    flex-shrink: 0;
  }
  .refresh-btn:active { color: var(--text); }
  .refresh-btn.spinning { animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.live { background: var(--green); }
  .dot.error { background: var(--red); }

  /* ───── Display rows ───── */
  .display {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    padding: 4px 0;
  }

  .row {
    position: relative;
    padding: 12px 16px;
    border-radius: 14px;
    background: var(--surface);
    border: 1px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.05s;
  }
  .row.active {
    background: var(--surface-2);
    border-color: var(--accent-soft);
  }
  .row:not(.active):active {
    background: var(--surface-2);
    transform: scale(0.99);
  }
  .row-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .row-amount {
    font-family: var(--mono);
    font-size: clamp(36px, 10.5vw, 52px);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
    word-break: break-all;
    overflow-wrap: anywhere;
  }

  /* ───── Presets ───── */
  .presets {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0;
    scrollbar-width: none;
  }
  .presets::-webkit-scrollbar { display: none; }
  .preset {
    flex-shrink: 0;
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 400;
    padding: 12px 18px;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: background 0.08s;
    -webkit-tap-highlight-color: transparent;
    min-width: 56px;
  }
  .preset:active {
    background: var(--surface-2);
  }

  /* ───── Numpad ───── */
  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: 1fr;
    gap: 8px;
    padding: 4px 0;
    height: 54dvh;
    max-height: 460px;
  }

  .key {
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 400;
    border: none;
    border-radius: 14px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: transform 0.05s, background 0.08s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
  }
  .key:active {
    background: var(--surface-2);
    transform: scale(0.96);
  }
  .key.action {
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--muted);
    font-size: 24px;
  }
  .key.action:active {
    background: var(--surface);
    color: var(--text);
  }
  .key.zero { grid-column: span 2; }
  .key.multi-zero { font-size: 26px; color: var(--muted); }

  /* ───── Tiny screens ───── */
  @media (max-height: 720px) {
    .row { padding: 10px 14px; }
    .row-amount { font-size: clamp(30px, 9vw, 44px); }
    .numpad { gap: 6px; height: 50dvh; }
    .key { font-size: 26px; border-radius: 12px; }
    .key.action { font-size: 22px; }
    .key.multi-zero { font-size: 22px; }
    .preset { font-size: 15px; padding: 10px 16px; }
  }
</style>
</head>
<body>

<div class="rate-strip">
  <div class="dot" id="dot"></div>
  <div class="rate-content" id="rate-line">loading rate…</div>
  <button class="refresh-btn" id="refresh-btn" onclick="fetchRate()" aria-label="Refresh rate">↻</button>
</div>

<div class="display">
  <div class="row" id="row-thb" data-currency="THB">
    <div class="row-label">฿ Thai Baht</div>
    <div class="row-amount" id="thb-amount">0</div>
  </div>
  <div class="row" id="row-eur" data-currency="EUR">
    <div class="row-label">€ Euro</div>
    <div class="row-amount" id="eur-amount">0</div>
  </div>
</div>

<div class="presets" id="presets">
  <button class="preset" data-amt="50">50</button>
  <button class="preset" data-amt="60">60</button>
  <button class="preset" data-amt="70">70</button>
  <button class="preset" data-amt="80">80</button>
  <button class="preset" data-amt="90">90</button>
  <button class="preset" data-amt="100">100</button>
  <button class="preset" data-amt="200">200</button>
  <button class="preset" data-amt="300">300</button>
  <button class="preset" data-amt="400">400</button>
  <button class="preset" data-amt="1000">1000</button>
</div>

<div class="numpad" id="numpad">
  <button class="key" data-key="7">7</button>
  <button class="key" data-key="8">8</button>
  <button class="key" data-key="9">9</button>
  <button class="key action" data-key="back" aria-label="Backspace">⌫</button>

  <button class="key" data-key="4">4</button>
  <button class="key" data-key="5">5</button>
  <button class="key" data-key="6">6</button>
  <button class="key action" data-key="clear" aria-label="Clear">C</button>

  <button class="key" data-key="1">1</button>
  <button class="key" data-key="2">2</button>
  <button class="key" data-key="3">3</button>
  <button class="key" data-key=".">.</button>

  <button class="key zero" data-key="0">0</button>
  <button class="key multi-zero" data-key="00">00</button>
  <button class="key multi-zero" data-key="000">000</button>
</div>

<script>
const CACHE_KEY = 'thb_eur_rate_v2';
const CACHE_TS_KEY = 'thb_eur_ts_v2';
const ACTIVE_KEY = 'thb_eur_active';

const SOURCES = [
  { name: 'jsdelivr', url: 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/thb.json', parse: d => d.thb.eur },
  { name: 'frankfurter', url: 'https://api.frankfurter.dev/v1/latest?base=THB&symbols=EUR', parse: d => d.rates.EUR },
  { name: 'er-api', url: 'https://open.er-api.com/v6/latest/THB', parse: d => d.rates.EUR }
];

let rate = null;          // 1 THB = X EUR
let inputStr = '';
let active = localStorage.getItem(ACTIVE_KEY) || 'THB';   // which currency the user is typing in

const CURRENCIES = {
  THB: { code: 'THB', symbol: '฿', name: 'Thai Baht', decimals: 0 },
  EUR: { code: 'EUR', symbol: '€', name: 'Euro', decimals: 2 }
};

/* ───── Number formatting ───── */
function formatTyped(str, decimals) {
  if (!str) return '0';
  const [intPart, decPart] = str.split('.');
  const intFormatted = parseInt(intPart || '0', 10).toLocaleString('en-US');
  return decPart !== undefined ? intFormatted + '.' + decPart : intFormatted;
}
function formatComputed(val, decimals) {
  return val.toLocaleString('en-US', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

/* ───── Compute the inactive currency from the active input ───── */
function computeOther() {
  const v = parseFloat(inputStr);
  if (!rate || isNaN(v)) return null;
  return active === 'THB' ? v * rate : v / rate;
}

/* ───── Render ───── */
function render() {
  const thbRow = document.getElementById('row-thb');
  const eurRow = document.getElementById('row-eur');
  const thbAmt = document.getElementById('thb-amount');
  const eurAmt = document.getElementById('eur-amount');

  thbRow.classList.toggle('active', active === 'THB');
  eurRow.classList.toggle('active', active === 'EUR');

  const other = computeOther();

  if (active === 'THB') {
    thbAmt.textContent = '฿ ' + formatTyped(inputStr, 0);
    eurAmt.textContent = '€ ' + (other === null ? '0' : formatComputed(other, 2));
  } else {
    eurAmt.textContent = '€ ' + formatTyped(inputStr, 2);
    thbAmt.textContent = '฿ ' + (other === null ? '0' : formatComputed(other, 0));
  }
}

/* ───── Tap a row to make it active and reset the input ───── */
function switchTo(currency) {
  active = currency;
  localStorage.setItem(ACTIVE_KEY, active);
  inputStr = '';
  render();
  if (navigator.vibrate) navigator.vibrate(8);
}

/* ───── Numpad input ───── */
function press(key) {
  if (key === 'back') {
    inputStr = inputStr.slice(0, -1);
  } else if (key === 'clear') {
    inputStr = '';
  } else if (key === '.') {
    if (CURRENCIES[active].decimals === 0) return;  // no decimals for THB
    if (!inputStr.includes('.')) inputStr = (inputStr || '0') + '.';
  } else if (key === '00' || key === '000') {
    // Only meaningful when there's already a non-zero number being typed
    if (!inputStr || inputStr === '0') return;
    for (const ch of key) {
      const digitsOnly = inputStr.replace('.', '');
      if (digitsOnly.length >= 12) break;
      if (active === 'EUR' && inputStr.includes('.')) {
        const d = inputStr.split('.')[1] || '';
        if (d.length >= 2) break;
      }
      inputStr += ch;
    }
  } else if (/^[0-9]$/.test(key)) {
    if (inputStr === '0') inputStr = key;
    else {
      const digitsOnly = inputStr.replace('.', '');
      if (digitsOnly.length < 12) inputStr += key;
    }
    // For EUR, cap to 2 decimals
    if (active === 'EUR' && inputStr.includes('.')) {
      const [i, d] = inputStr.split('.');
      if (d.length > 2) inputStr = i + '.' + d.slice(0, 2);
    }
  }
  render();
  if (navigator.vibrate) navigator.vibrate(8);
}

/* ───── Event wiring ───── */
document.getElementById('numpad').addEventListener('click', e => {
  const btn = e.target.closest('.key');
  if (btn) press(btn.dataset.key);
});

document.getElementById('presets').addEventListener('click', e => {
  const btn = e.target.closest('.preset');
  if (!btn) return;
  inputStr = btn.dataset.amt;
  render();
  if (navigator.vibrate) navigator.vibrate(8);
});

document.getElementById('row-thb').addEventListener('click', () => switchTo('THB'));
document.getElementById('row-eur').addEventListener('click', () => switchTo('EUR'));

document.addEventListener('keydown', e => {
  if (/^[0-9]$/.test(e.key)) press(e.key);
  else if (e.key === '.' || e.key === ',') press('.');
  else if (e.key === 'Backspace') press('back');
  else if (e.key === 'Escape' || e.key === 'Delete') press('clear');
  else if (e.key === 'Tab') { e.preventDefault(); switchTo(active === 'THB' ? 'EUR' : 'THB'); }
});

/* ───── Rate fetching ───── */
function setRateLine(html, dotState) {
  document.getElementById('dot').className = 'dot' + (dotState ? ' ' + dotState : '');
  document.getElementById('rate-line').innerHTML = html;
}

function rateLineHtml(r, ageStr) {
  return '1฿ = €' + r.toFixed(5) +
         ' <span class="sep">·</span> ' +
         '1€ = ฿' + (1 / r).toFixed(2) +
         ' <span class="sep">·</span> ' +
         '<span class="age">' + ageStr + '</span>';
}

function loadCache() {
  const r = localStorage.getItem(CACHE_KEY);
  const ts = localStorage.getItem(CACHE_TS_KEY);
  if (r && ts) {
    rate = parseFloat(r);
    const ageMin = Math.round((Date.now() - parseInt(ts, 10)) / 60000);
    const ageStr = ageMin < 1 ? 'just now'
                  : ageMin < 60 ? ageMin + 'm ago'
                  : ageMin < 1440 ? Math.round(ageMin / 60) + 'h ago'
                  : Math.round(ageMin / 1440) + 'd ago';
    setRateLine(rateLineHtml(rate, ageStr), '');
    render();
  }
}

async function fetchRate() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('dot').className = 'dot';

  for (const src of SOURCES) {
    try {
      const res = await fetch(src.url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const r = src.parse(data);
      if (!r || isNaN(r)) throw new Error('bad rate');
      rate = r;
      localStorage.setItem(CACHE_KEY, rate);
      localStorage.setItem(CACHE_TS_KEY, Date.now());
      const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      setRateLine(rateLineHtml(rate, t), 'live');
      render();
      btn.classList.remove('spinning');
      return;
    } catch (e) {
      console.warn(src.name + ' failed:', e.message);
    }
  }

  if (rate) {
    setRateLine(rateLineHtml(rate, 'offline'), 'error');
  } else {
    setRateLine('offline — no rate available', 'error');
  }
  btn.classList.remove('spinning');
}

/* ───── Init ───── */
loadCache();
render();
fetchRate();
</script>
</body>
</html>
